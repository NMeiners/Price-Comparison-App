<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Local Price Finder — Prices</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  :root{
    --bg:#07121a; --panel:#0b1220; --card:#0f1724; --muted:#9fb0c0; --accent:#22d3ee; --text:#e6f6fb;
    --light-bg:#f6f8fb; --light-panel:#ffffff; --light-text:#111827; --light-muted:#556170; --light-accent:#2563eb;
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Arial;background:var(--bg);color:var(--text)}
  body.light{background:var(--light-bg);color:var(--light-text)}
  .app{max-width:1200px;margin:12px auto;padding:12px;display:flex;flex-direction:column;gap:12px}
  .topbar{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:linear-gradient(90deg,#06202a,#04202b)}
  body.light .topbar{background:linear-gradient(90deg,#fff,#f7fbff)}
  .brand{font-weight:700;font-size:18px}
  .controls{margin-left:auto;display:flex;gap:8px;align-items:center}
  .searchbar{display:flex;gap:8px;padding:10px;border-radius:10px;background:var(--panel);align-items:center}
  .searchbar input[type="search"]{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;font-size:15px}
  .btn{background:var(--accent);border:0;padding:10px 12px;border-radius:8px;color:#042;font-weight:700;cursor:pointer}
  body.light .btn{background:var(--light-accent);color:#fff}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:12px;min-height:60vh}
  @media(max-width:900px){ .layout{grid-template-columns:1fr;grid-auto-rows:min-content} }
  .panel{background:var(--card);padding:12px;border-radius:12px;overflow:auto}
  body.light .panel{background:var(--light-panel)}
  #results{display:flex;flex-direction:column;gap:8px}
  .storeCard{padding:10px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.01),transparent);display:flex;gap:10px;align-items:flex-start;border:1px solid rgba(255,255,255,0.03)}
  body.light .storeCard{border:1px solid rgba(0,0,0,0.06)}
  .storeCard h4{margin:0;font-size:15px}
  .meta{font-size:13px;color:var(--muted);margin-top:4px}
  .actions{margin-left:auto;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .linkBtn{display:inline-block;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.02);color:var(--accent);text-decoration:none;font-weight:700;cursor:pointer}
  .small{font-size:13px;color:var(--muted)}
  #map {height:72vh;border-radius:12px;overflow:hidden}
  .price{font-weight:800;color:var(--accent);margin-top:6px}
  body.light .price{color:var(--light-accent)}
  .morePrices{margin-top:6px;font-size:13px;color:var(--muted);cursor:pointer}
  .priceList{margin-top:6px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);max-width:220px}
  body.light .priceList{background:#f0f6ff}
  .storeCard.active{outline:2px solid rgba(34,211,238,0.12)}
  .status{font-size:13px;color:var(--muted);margin-top:6px}
  .settingsModal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);z-index:9999}
  .settingsCard{width:320px;background:var(--card);padding:14px;border-radius:10px}
  body.light .settingsCard{background:var(--light-panel)}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="brand">Local Price Finder</div>
      <div class="small">Local stores first. Best-effort price parsing.</div>
    </div>
    <div class="controls">
      <div class="small" id="unitLabel">units: km</div>
      <button id="settingsBtn" class="btn" style="background:transparent;border:1px solid rgba(255,255,255,0.04);color:inherit">Settings</button>
    </div>
  </div>

  <div class="searchbar panel">
    <input id="itemInput" type="search" placeholder="Search items (e.g., milk, batteries, bread)" />
    <button id="searchBtn" class="btn">Search</button>
    <div style="margin-left:auto" class="small">Radius:
      <input id="radiusRange" type="range" min="500" max="10000" step="250" value="3000" style="vertical-align:middle">
      <span id="radiusLabel">3.00 km</span>
    </div>
  </div>

  <div class="layout">
    <div class="panel" id="leftPanel">
      <div style="display:flex;justify-content:space-between">
        <div class="small" id="resultsHeader">Results</div>
        <div class="small" id="statusText">Ready</div>
      </div>

      <div id="variantArea" style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0"></div>

      <div id="results"></div>

      <div class="small" style="margin-top:8px">If parsing fails the app provides direct search links.</div>
    </div>

    <div class="panel" id="mapPanel">
      <div id="map"></div>
    </div>
  </div>
</div>

<!-- Settings -->
<div id="settingsModal" class="settingsModal" aria-hidden="true">
  <div class="settingsCard">
    <h3 style="margin:0 0 8px 0">Settings</h3>
    <label>Units</label>
    <select id="unitSelect">
      <option value="km">Kilometers</option>
      <option value="mi">Miles</option>
    </select>
    <label style="margin-top:8px">Theme</label>
    <select id="themeSelect">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>
    <label style="margin-top:8px">Max radius (meters)</label>
    <input id="radiusNumber" type="number" min="500" max="20000" step="100" value="3000">
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
      <button id="closeSettings" class="btn" style="background:rgba(255,255,255,0.06);color:var(--text)">Close</button>
      <button id="saveSettings" class="btn">Save</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// State
const state = { pos:null, map:null, markers:[], stores:[], unit:'km', radius:3000, variants:[], currentVariant:null };

// DOM
const itemInput = document.getElementById('itemInput');
const searchBtn = document.getElementById('searchBtn');
const radiusRange = document.getElementById('radiusRange');
const radiusLabel = document.getElementById('radiusLabel');
const resultsEl = document.getElementById('results');
const statusText = document.getElementById('statusText');
const variantArea = document.getElementById('variantArea');
const unitLabel = document.getElementById('unitLabel');
const settingsBtn = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const unitSelect = document.getElementById('unitSelect');
const themeSelect = document.getElementById('themeSelect');
const radiusNumber = document.getElementById('radiusNumber');
const closeSettings = document.getElementById('closeSettings');
const saveSettings = document.getElementById('saveSettings');

// Utils
function setStatus(s){ statusText.textContent = s; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toMetersDisplay(m){ return state.unit==='mi' ? (m/1609.344).toFixed(1)+' mi' : (m/1000).toFixed(2)+' km'; }

// Haversine meters
function haversineMeters(a,b){
  const R=6371000, r=Math.PI/180;
  const dLat=(b.lat-a.lat)*r, dLon=(b.lon-a.lon)*r;
  const la=a.lat*r, lb=b.lat*r;
  const s=Math.sin(dLat/2)**2 + Math.cos(la)*Math.cos(lb)*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(s));
}

// Detect default unit (keep km default)
function detectDefaultUnit(){ state.unit='km'; unitSelect.value = state.unit; unitLabel.textContent = 'units: '+state.unit; }

// Map init
function initMap(){
  const mapDiv = document.getElementById('map');
  state.map = L.map(mapDiv).setView([39.5,-98.35], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(state.map);
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=> {
      state.pos = {lat:p.coords.latitude, lon:p.coords.longitude};
      state.map.setView([state.pos.lat, state.pos.lon], 13);
      L.circleMarker([state.pos.lat, state.pos.lon], {radius:7,color:'#22d3ee',fill:true,fillColor:'#22d3ee'}).addTo(state.map).bindPopup('You are here');
    }, (e)=> setStatus('Location not available'), {enableHighAccuracy:true, timeout:10000});
  } else { setStatus('Geolocation not supported'); }
}

// Category clusters (adaptive)
const clusters = {
  food: ["milk","bread","egg","coffee","butter","cheese","grocery","supermarket","bakery"],
  auto: ["tire","tyre","brake","car","engine","oil"],
  pharmacy: ["medicine","aspirin","vitamin","pharmacy","drug","shampoo"],
  electronics: ["laptop","phone","tablet","tv","electronics","computer"],
  household: ["detergent","soap","cleaner","tool","hardware","furniture"]
};
function getRelevantCategories(term){
  const q=term.toLowerCase();
  if(clusters.food.some(w=>q.includes(w))) return ["supermarket","convenience","grocery","bakery","butcher","pharmacy"];
  if(clusters.auto.some(w=>q.includes(w))) return ["car_repair","car_dealer","tyres","fuel"];
  if(clusters.pharmacy.some(w=>q.includes(w))) return ["pharmacy","drugstore"];
  if(clusters.electronics.some(w=>q.includes(w))) return ["electronics","department_store"];
  if(clusters.household.some(w=>q.includes(w))) return ["department_store","hardware"];
  return ["supermarket","convenience","department_store"];
}

// Overpass query by categories
async function overpassNearby(lat, lon, radius, cats){
  const catClauses = cats.map(cat => {
    return `node(around:${radius},${lat},${lon})["shop"="${cat}"];way(around:${radius},${lat},${lon})["shop"="${cat}"];relation(around:${radius},${lat},${lon})["shop"="${cat}"];`;
  }).join('');
  const q = `[out:json][timeout:25];(${catClauses});out center tags;`;
  try{
    const resp = await fetch('https://overpass-api.de/api/interpreter', {method:'POST', body:q});
    if(!resp.ok) return [];
    const js = await resp.json();
    return js.elements.map(e=> {
      const c = e.type==='node' ? {lat:e.lat, lon:e.lon} : (e.center || {lat:e.lat, lon:e.lon});
      return { id:e.id, name:(e.tags && (e.tags.name||e.tags.brand))||'Unnamed', tags:e.tags||{}, lat:c.lat, lon:c.lon, addr:(e.tags && (e.tags['addr:street']||''))||'' };
    });
  }catch(err){ console.warn('Overpass error',err); return []; }
}

// Fuzzy match + fallback
function filterStores(stores, query){
  const q = (query||'').toLowerCase().trim();
  if(!q) return stores.slice(0,30);
  const tokens = q.split(/\s+/).filter(Boolean);
  const matched = stores.filter(s=>{
    const hay = ((s.name||'') + ' ' + (s.tags && (s.tags.shop||'') ) + ' ' + (s.addr||'')).toLowerCase();
    // require at least one token present
    return tokens.every(t => hay.includes(t) || fuzzy(hay, t));
  });
  if(matched.length) return matched;
  // fallback: return closest stores
  if(state.pos){
    stores.forEach(s=> s.distance = haversineMeters(state.pos, {lat:s.lat, lon:s.lon}));
    stores.sort((a,b)=> (a.distance||0) - (b.distance||0));
    return stores.slice(0,30);
  }
  return stores.slice(0,30);
}
function fuzzy(hay, needle){
  if(hay.includes(needle)) return true;
  // allow one char deletion
  for(let i=0;i<needle.length;i++){ if(hay.includes(needle.slice(0,i)+needle.slice(i+1))) return true; }
  return false;
}

// Fetch via AllOrigins proxy (raw)
async function fetchRaw(url){
  const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
  try{
    const r = await fetch(proxy, {mode:'cors'});
    if(!r.ok) throw new Error('proxy fail');
    return await r.text();
  }catch(e){
    // fallback: direct (likely blocked)
    try{
      const r2 = await fetch(url);
      if(!r2.ok) throw e;
      return await r2.text();
    }catch(e2){
      throw e;
    }
  }
}

// Parse prices strictly (currency symbol or currency code)
function parsePricesFromHTML(text){
  const results = [];
  if(!text) return results;
  // JSON-LD
  const jsonld = [...text.matchAll(/<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/ig)];
  for(const m of jsonld){
    try{
      const obj = JSON.parse(m[1]);
      const arr = Array.isArray(obj) ? obj : [obj];
      for(const o of arr){
        if(o && (o['@type']=='Product' || (o['@type'] && /Product/i.test(o['@type'])))){
          const offers = o.offers;
          if(offers){
            if(Array.isArray(offers)){
              for(const ofr of offers) if(ofr.price && (ofr.priceCurrency||ofr.price)) results.push({priceRaw: String(ofr.price), currency: ofr.priceCurrency||null});
            } else {
              if(offers.price && (offers.priceCurrency||offers.price)) results.push({priceRaw:String(offers.price), currency: offers.priceCurrency||null});
            }
          }
          if(o.price) results.push({priceRaw:String(o.price), currency: o.priceCurrency||null});
        }
        if(o && o['@graph']){
          for(const g of o['@graph']){
            if(g && (g['@type']=='Product' || (g['@type'] && /Product/i.test(g['@type'])))){
              if(g.offers){
                const off = Array.isArray(g.offers) ? g.offers[0] : g.offers;
                if(off && off.price) results.push({priceRaw:String(off.price), currency: off.priceCurrency||null});
              }
            }
          }
        }
      }
    }catch(err){}
  }

  // Strict currency-symbol regex: symbol + number with optional thousands commas and 2 decimals
  const symbolRx = /([$€£¥])\s?(\d{1,3}(?:[.,]\d{3})*(?:\.\d{2})?)/g;
  let m;
  while((m = symbolRx.exec(text)) !== null){
    results.push({priceRaw: m[1] + m[2], currency: m[1]});
  }

  // Strict currency code pattern (USD 12.34)
  const codeRx = /\b(USD|EUR|GBP|CAD|AUD)\s?(\d{1,3}(?:[.,]\d{3})*(?:\.\d{2})?)\b/g;
  while((m = codeRx.exec(text)) !== null){
    results.push({priceRaw: m[1] + ' ' + m[2], currency: m[1]});
  }

  // Normalize and dedupe, only accept entries with currency symbol or code
  const parsed = results.map(r=>{
    // extract numeric portion
    const s = String(r.priceRaw).replace(/[^\d.,]/g,'');
    // handle comma as thousands: remove commas
    const norm = s.replace(/,/g,'');
    const val = parseFloat(norm);
    if(Number.isFinite(val) && val>0 && val < 100000) return {value: val, display: (r.currency? (r.currency + ' ') : '') + (isNaN(val)? r.priceRaw : (r.currency && r.currency.length===1 ? r.currency + val.toFixed(2) : (val.toFixed(2))))};
    return null;
  }).filter(Boolean);
  // dedupe by numeric value
  const unique = [];
  const seen = new Set();
  for(const p of parsed){
    const key = p.value;
    if(!seen.has(key)){ unique.push(p); seen.add(key); }
  }
  unique.sort((a,b)=>a.value-b.value);
  return unique;
}

// Price parsing attempt: try store site search, then Google/Bing shopping via proxy
async function attemptPriceParse(variant, store){
  const found = [];
  // try store website search if available
  if(store.tags && store.tags.website){
    try{
      const url = store.tags.website.replace(/\/$/,'') + '/search?q=' + encodeURIComponent(variant);
      const html = await fetchRaw(url);
      const p = parsePricesFromHTML(html);
      if(p.length) found.push(...p);
    }catch(e){}
  }
  // Google Shopping
  try{
    const g = 'https://www.google.com/search?q=' + encodeURIComponent(variant + ' ' + store.name) + '&tbm=shop';
    const htmlG = await fetchRaw(g);
    const pG = parsePricesFromHTML(htmlG);
    if(pG.length) found.push(...pG);
  }catch(e){}
  // Bing Shopping
  try{
    const b = 'https://www.bing.com/shop?q=' + encodeURIComponent(variant + ' ' + store.name);
    const htmlB = await fetchRaw(b);
    const pB = parsePricesFromHTML(htmlB);
    if(pB.length) found.push(...pB);
  }catch(e){}

  // Normalize dedupe
  const merged = [];
  const seen = new Set();
  for(const p of found){
    const key = Math.round(p.value*100);
    if(!seen.has(key)){ merged.push(p); seen.add(key); }
  }
  merged.sort((a,b)=>a.value-b.value);
  return merged;
}

// UI helpers
function clearResults(){ resultsEl.innerHTML=''; state.map && state.markers && state.markers.forEach(m=>state.map.removeLayer(m)); state.markers=[]; state.stores=[]; }
function addStoreCard(store){
  const card = document.createElement('div'); card.className='storeCard';
  card.dataset.id = store._id || '';
  const left = document.createElement('div'); left.style.flex='1';
  left.innerHTML = `<h4>${escapeHtml(store.name)}</h4><div class="meta">${escapeHtml(store.tags && (store.tags.shop||store.tags.amenity||''))} ${store.addr || ''}</div>`;
  const right = document.createElement('div'); right.className='actions';
  if(store.priceList && store.priceList.length){
    const lp = store.priceList[0];
    const priceEl = document.createElement('div'); priceEl.className='price'; priceEl.textContent = lp.display || ('$' + lp.value.toFixed(2));
    right.appendChild(priceEl);
    if(store.priceList.length>1){
      const more = document.createElement('div'); more.className='morePrices'; more.textContent = `More prices ▼ (${store.priceList.length})`;
      const list = document.createElement('div'); list.className='priceList'; list.style.display='none';
      store.priceList.forEach(p=> { const row = document.createElement('div'); row.textContent = p.display || p.value.toFixed(2); list.appendChild(row); });
      more.onclick = ()=>{ list.style.display = list.style.display==='none' ? 'block' : 'none'; };
      right.appendChild(more); right.appendChild(list);
    }
  } else {
    const no = document.createElement('div'); no.className='small'; no.textContent='Price not found';
    right.appendChild(no);
  }
  // search link
  const searchUrl = store.searchUrl || ('https://www.google.com/search?q=' + encodeURIComponent((state.currentVariant||'') + ' ' + store.name));
  const openBtn = document.createElement('a'); openBtn.className='linkBtn'; openBtn.href = searchUrl; openBtn.target='_blank'; openBtn.rel='noopener'; openBtn.textContent='Open search';
  right.appendChild(openBtn);
  const mapBtn = document.createElement('a'); mapBtn.className='linkBtn'; mapBtn.textContent='View on map'; mapBtn.onclick = ()=>{ state.map.setView([store.lat, store.lon], 16); store._marker && store._marker.openPopup(); };
  right.appendChild(mapBtn);

  card.appendChild(left);
  card.appendChild(right);
  // distance
  const dist = document.createElement('div'); dist.className='small'; dist.style.marginTop='6px';
  dist.textContent = store.distanceDisplay || '';
  card.appendChild(dist);

  card.onclick = ()=>{
    document.querySelectorAll('.storeCard.active').forEach(e=>e.classList.remove('active'));
    card.classList.add('active');
    state.map.setView([store.lat, store.lon], 16);
    store._marker && store._marker.openPopup();
  };

  resultsEl.appendChild(card);

  // add marker
  if(state.map){
    const marker = L.marker([store.lat, store.lon]).addTo(state.map)
      .bindPopup(`<strong>${escapeHtml(store.name)}</strong><br>${store.distanceDisplay || ''}${store.priceList && store.priceList.length?('<br>'+store.priceList[0].display):''}`);
    store._marker = marker;
    state.markers.push(marker);
    marker.on('click', ()=>{ document.querySelectorAll('.storeCard.active').forEach(e=>e.classList.remove('active')); card.classList.add('active'); });
  }
}

// Render all results
function renderAll(){
  clearResults();
  state.stores.forEach(s=> addStoreCard(s));
}

// Expand variants
function expandVariants(query){
  const q = query.toLowerCase().trim();
  const set = new Set(); set.add(query);
  if(q.includes('milk')) ['whole milk','2% milk','skim milk','milk gallon'].forEach(x=>set.add(x));
  if(q.includes('egg')) ['eggs dozen','large eggs'].forEach(x=>set.add(x));
  if(q.includes('bread')) ['whole wheat bread','sourdough loaf'].forEach(x=>set.add(x));
  set.add(q + ' 1 each'); set.add(q + ' pack');
  return Array.from(set).slice(0,12);
}

// Render variant UI
function renderVariants(list){
  variantArea.innerHTML=''; list.forEach((v,i)=>{
    const el = document.createElement('div'); el.className='variant'; el.textContent = v;
    if(i===0) el.classList.add('active');
    el.onclick = async ()=>{
      document.querySelectorAll('.variant').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      state.currentVariant = v;
      // re-parse top stores for selected variant
      setStatus('Checking prices for variant...');
      for(let i=0;i<Math.min(8, state.stores.length); i++){
        const s = state.stores[i];
        try{ const p = await attemptPriceParse(state.currentVariant, s); if(p && p.length){ s.priceList = p; } }catch(e){}
        await sleep(200);
      }
      renderAll();
      setStatus('Variant check complete.');
    };
    variantArea.appendChild(el);
  });
}

// Main search pipeline
async function onSearch(){
  const q = (itemInput.value||'').trim();
  if(!q){ setStatus('Enter a search term.'); return; }
  setStatus('Preparing search...');
  state.variants = expandVariants(q);
  renderVariants(state.variants);
  state.currentVariant = state.variants[0] || q;
  // ensure map and location
  if(!state.map) initMap();
  if(!state.pos){
    try{ await getLocationOnce(); }catch(e){ setStatus('Location required'); return; }
  }
  // primary: Overpass by categories
  setStatus('Finding nearby stores...');
  const cats = getRelevantCategories(q);
  const stores = await overpassNearby(state.pos.lat, state.pos.lon, Number(radiusRange.value || state.radius), cats);
  setStatus(`Found ${stores.length} local places. Filtering...`);
  let matched = filterStores(stores, q);
  if(matched.length === 0){
    setStatus('No matches found nearby.');
  }
  // compute distances and format
  matched.forEach((s,idx)=>{ s.distanceMeters = Math.round(haversineMeters(state.pos, {lat:s.lat, lon:s.lon})); s.distanceDisplay = toMetersDisplay(s.distanceMeters); s._id = `${s.id}_${idx}`; s.searchUrl = `https://www.google.com/search?q=${encodeURIComponent((state.currentVariant||q)+' '+s.name)}`; });

  state.stores = matched;
  if(state.stores.length === 0){ setStatus('No stores found. Showing external search links.'); renderFallbackLinks(q); return; }

  // Try to parse prices for top N stores sequentially (polite)
  setStatus('Attempting to parse prices (best-effort)...');
  for(let i=0;i<Math.min(12, state.stores.length); i++){
    const s = state.stores[i];
    try{
      const parsed = await attemptPriceParse(state.currentVariant, s);
      if(parsed && parsed.length) s.priceList = parsed;
    }catch(e){}
    renderAll(); // progressive update
    await sleep(300);
  }
  setStatus(`Showing ${state.stores.length} result(s).`);
  renderAll();
}

// get relevant categories (reuse from earlier)
function getRelevantCategories(term){
  const q=term.toLowerCase();
  if(clusters.food.some(w=>q.includes(w))) return ["supermarket","convenience","grocery","bakery","butcher","pharmacy"];
  if(clusters.auto.some(w=>q.includes(w))) return ["car_repair","car_dealer","tyres","fuel"];
  if(clusters.pharmacy.some(w=>q.includes(w))) return ["pharmacy","drugstore"];
  if(clusters.electronics.some(w=>q.includes(w))) return ["electronics","department_store"];
  if(clusters.household.some(w=>q.includes(w))) return ["department_store","hardware"];
  return ["supermarket","convenience","department_store"];
}

// fallback external links when no structured results
function renderFallbackLinks(query){
  clearResults();
  const links = [
    {label:'Google Maps', url:`https://www.google.com/maps/search/${encodeURIComponent(query+' near me')}`},
    {label:'Bing', url:`https://www.bing.com/search?q=${encodeURIComponent(query+' near me')}`},
    {label:'DuckDuckGo', url:`https://duckduckgo.com/?q=${encodeURIComponent(query+' near me')}`}
  ];
  links.forEach(l=>{
    const div = document.createElement('div'); div.className='storeCard';
    div.innerHTML = `<div style="flex:1"><strong>${escapeHtml(l.label)}</strong><div class="small">Open external search</div></div>
      <div style="display:flex;flex-direction:column;gap:8px"><a class="linkBtn" href="${l.url}" target="_blank" rel="noopener">Open</a></div>`;
    resultsEl.appendChild(div);
  });
}

// init map and helpers
function initMap(){
  const mapDiv = document.getElementById('map');
  state.map = L.map(mapDiv).setView([39.5,-98.35], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'&copy; OpenStreetMap contributors' }).addTo(state.map);
}
async function getLocationOnce(){
  return new Promise((res,rej)=>{
    if(state.pos) return res(state.pos);
    if(!navigator.geolocation) return rej(new Error('no geo'));
    navigator.geolocation.getCurrentPosition(p=>{
      state.pos = {lat:p.coords.latitude, lon:p.coords.longitude};
      if(!state.map) initMap();
      L.circleMarker([state.pos.lat, state.pos.lon], {radius:7,color:'#22d3ee',fill:true,fillColor:'#22d3ee'}).addTo(state.map).bindPopup('You are here');
      state.map.setView([state.pos.lat, state.pos.lon], 13);
      res(state.pos);
    }, err=>rej(err), {enableHighAccuracy:true, timeout:10000});
  });
}

// ------------------- wiring -------------------
radiusRange.addEventListener('input', ()=>{ radiusLabel.textContent = toMetersDisplay(Number(radiusRange.value)); radiusNumber.value = radiusRange.value; });
itemInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') onSearch(); });
searchBtn.addEventListener('click', onSearch);
settingsBtn.addEventListener('click', ()=>{ settingsModal.style.display='flex'; settingsModal.setAttribute('aria-hidden','false'); });
closeSettings.addEventListener('click', ()=>{ settingsModal.style.display='none'; settingsModal.setAttribute('aria-hidden','true'); });
saveSettings.addEventListener('click', ()=>{ state.unit = unitSelect.value; document.body.classList.toggle('light', themeSelect.value==='light'); radiusRange.value = Number(radiusNumber.value||radiusRange.value); radiusLabel.textContent = toMetersDisplay(Number(radiusRange.value)); settingsModal.style.display='none'; settingsModal.setAttribute('aria-hidden','true'); unitLabel.textContent='units: '+state.unit; renderAll(); });

// ------------------- END -------------------
// small initial setup
detectDefaultUnit();
initMap();
setStatus('Ready. Allow location and search.');

</script>
