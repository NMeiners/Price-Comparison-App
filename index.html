<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Local Price Finder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  :root{
    --bg:#07121a; --panel:#0b1220; --card:#0f1724; --muted:#9fb0c0; --accent:#22d3ee; --text:#e6f6fb;
    --light-bg:#f6f8fb; --light-panel:#ffffff; --light-text:#111827; --light-muted:#556170; --light-accent:#2563eb;
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Arial;background:var(--bg);color:var(--text)}
  body.light{background:var(--light-bg);color:var(--light-text)}
  .app{max-width:1200px;margin:12px auto;padding:12px;display:flex;flex-direction:column;gap:12px}
  .topbar{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:linear-gradient(90deg,#06202a,#04202b)}
  body.light .topbar{background:linear-gradient(90deg,#fff,#f7fbff)}
  .brand{font-weight:700;font-size:18px}
  .sub{font-size:13px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:8px;align-items:center}
  .searchbar{display:flex;gap:8px;padding:10px;border-radius:10px;background:var(--panel);align-items:center}
  .searchbar input[type="search"]{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;font-size:15px}
  .btn{background:var(--accent);border:0;padding:10px 12px;border-radius:8px;color:#042;font-weight:700;cursor:pointer}
  body.light .btn{background:var(--light-accent);color:#fff}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:12px;min-height:60vh}
  @media(max-width:900px){ .layout{grid-template-columns:1fr;grid-auto-rows:min-content} }
  .panel{background:var(--card);padding:12px;border-radius:12px;overflow:auto}
  body.light .panel{background:var(--light-panel)}
  #results{display:flex;flex-direction:column;gap:8px}
  .storeCard{padding:10px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.01),transparent);display:flex;gap:10px;align-items:flex-start;border:1px solid rgba(255,255,255,0.03)}
  body.light .storeCard{border:1px solid rgba(0,0,0,0.06)}
  .storeCard h4{margin:0;font-size:15px}
  .meta{font-size:13px;color:var(--muted);margin-top:4px}
  .actions{margin-left:auto;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .linkBtn{display:inline-block;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.02);color:var(--accent);text-decoration:none;font-weight:700;cursor:pointer}
  .small{font-size:13px;color:var(--muted)}
  #map {height:72vh;border-radius:12px;overflow:hidden}
  .price{font-weight:800;color:var(--accent);margin-top:6px}
  body.light .price{color:var(--light-accent)}
  .morePrices{margin-top:6px;font-size:13px;color:var(--muted);cursor:pointer}
  .priceList{margin-top:6px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);max-width:220px}
  body.light .priceList{background:#f0f6ff}
  .storeCard.active{outline:2px solid rgba(34,211,238,0.12)}
  .status{font-size:13px;color:var(--muted);margin-top:6px}
  .settingsModal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);z-index:9999}
  .settingsCard{width:320px;background:var(--card);padding:14px;border-radius:10px}
  body.light .settingsCard{background:var(--light-panel)}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div>
      <div class="brand">Local Price Finder</div>
      <div class="sub">Local stores first. Prices shown when available.</div>
    </div>
    <div class="controls">
      <div class="small" id="unitLabel">units: km</div>
      <button id="settingsBtn" class="btn" style="background:transparent;border:1px solid rgba(255,255,255,0.04);color:inherit">Settings</button>
    </div>
  </div>

  <div class="searchbar panel">
    <input id="itemInput" type="search" placeholder="Search items (e.g., milk, batteries, bread)" />
    <button id="searchBtn" class="btn">Search</button>
    <div style="margin-left:auto" class="small">Radius:
      <input id="radiusRange" type="range" min="500" max="10000" step="250" value="3000" style="vertical-align:middle">
      <span id="radiusLabel">3.00 km</span>
    </div>
  </div>

  <div class="layout">
    <div class="panel" id="leftPanel">
      <div style="display:flex;justify-content:space-between">
        <div class="small" id="resultsHeader">Results</div>
        <div class="small" id="statusText">Ready</div>
      </div>

      <div id="variantArea" style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0"></div>

      <div id="results"></div>

      <div class="small" style="margin-top:8px">If parsing fails the app provides direct search links.</div>
    </div>

    <div class="panel" id="mapPanel">
      <div id="map"></div>
    </div>
  </div>
</div>

<!-- Settings -->
<div id="settingsModal" class="settingsModal" aria-hidden="true">
  <div class="settingsCard">
    <h3 style="margin:0 0 8px 0">Settings</h3>
    <label>Units</label>
    <select id="unitSelect"><option value="km">Kilometers</option><option value="mi">Miles</option></select>
    <label style="margin-top:8px">Theme</label>
    <select id="themeSelect"><option value="dark">Dark</option><option value="light">Light</option></select>
    <label style="margin-top:8px">Max radius (meters)</label>
    <input id="radiusNumber" type="number" min="500" max="20000" step="100" value="3000">
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
      <button id="closeSettings" class="btn" style="background:rgba(255,255,255,0.06);color:var(--text)">Close</button>
      <button id="saveSettings" class="btn">Save</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
/* Clean, consolidated, working version.
   Strategy:
    - Overpass primary search by category cluster derived from query
    - Nominatim fallback if Overpass returns nothing
    - Filter locally; rank by distance & keyword match
    - Render list + map immediately, then progressively attempt price parsing
    - Price parsing done via AllOrigins proxy to avoid CORS when possible; non-blocking
    - Strict price regex to favor accuracy
*/

// state
const S = { pos:null, map:null, markers:[], stores:[], unit:'km', radius:3000, variants:[], currentVariant:null };

// dom
const itemInput = document.getElementById('itemInput');
const searchBtn = document.getElementById('searchBtn');
const radiusRange = document.getElementById('radiusRange');
const radiusLabel = document.getElementById('radiusLabel');
const resultsEl = document.getElementById('results');
const statusText = document.getElementById('statusText');
const variantArea = document.getElementById('variantArea');
const unitLabel = document.getElementById('unitLabel');
const settingsBtn = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const unitSelect = document.getElementById('unitSelect');
const themeSelect = document.getElementById('themeSelect');
const radiusNumber = document.getElementById('radiusNumber');
const closeSettings = document.getElementById('closeSettings');
const saveSettings = document.getElementById('saveSettings');

function setStatus(s){ statusText.textContent = s; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// haversine (meters)
function haversineMeters(a,b){
  const R=6371000, r=Math.PI/180;
  const dLat=(b.lat-a.lat)*r, dLon=(b.lon-a.lon)*r;
  const la=a.lat*r, lb=b.lat*r;
  const s=Math.sin(dLat/2)**2 + Math.cos(la)*Math.cos(lb)*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(s));
}
function formatDistance(m){
  if(S.unit==='mi') return (m/1609.344).toFixed(1) + ' mi';
  return (m/1000).toFixed(2) + ' km';
}

// init
radiusRange.value = S.radius;
radiusNumber.value = S.radius;
radiusLabel.textContent = formatDistance(S.radius);

// simple cluster map
const CLUSTERS = {
  food: ["milk","bread","egg","coffee","butter","cheese","grocery","supermarket","bakery"],
  auto: ["tire","tyre","brake","car","engine","oil","wheel","battery"],
  pharmacy: ["medicine","aspirin","vitamin","pharmacy","drug","shampoo","toothpaste"],
  electronics: ["laptop","phone","tablet","tv","electronics","computer","charger"],
  household: ["detergent","soap","cleaner","tool","hardware","furniture","paint"]
};
function getCategoriesForQuery(q){
  const t = q.toLowerCase();
  if(CLUSTERS.food.some(w=>t.includes(w))) return ["supermarket","convenience","grocery","bakery","butcher","pharmacy"];
  if(CLUSTERS.auto.some(w=>t.includes(w))) return ["car_repair","car_dealer","tyres","fuel","car_parts"];
  if(CLUSTERS.pharmacy.some(w=>t.includes(w))) return ["pharmacy","drugstore"];
  if(CLUSTERS.electronics.some(w=>t.includes(w))) return ["electronics","department_store"];
  if(CLUSTERS.household.some(w=>t.includes(w))) return ["department_store","hardware"];
  return ["supermarket","convenience","department_store"];
}

// Overpass primary search (broad but category-limited)
async function overpassSearch(lat, lon, radius, categories){
  // build query with nodes/ways/relations for shop categories + amenity=supermarket
  let clauses = '';
  categories.forEach(cat=>{
    clauses += `node(around:${radius},${lat},${lon})[shop="${cat}"];way(around:${radius},${lat},${lon})[shop="${cat}"];relation(around:${radius},${lat},${lon})[shop="${cat}"];`;
  });
  // also include amenity=supermarket and convenience
  clauses += `node(around:${radius},${lat},${lon})[amenity=supermarket];node(around:${radius},${lat},${lon})[shop=convenience];`;
  const q = `[out:json][timeout:25];(${clauses});out center tags;`;
  try{
    const resp = await fetch('https://overpass-api.de/api/interpreter', {method:'POST', body:q});
    if(!resp.ok) throw new Error('Overpass error '+resp.status);
    const js = await resp.json();
    return js.elements.map(e=>{
      const center = e.type==='node' ? {lat:e.lat, lon:e.lon} : (e.center || {lat:e.lat, lon:e.lon});
      return {
        id: e.id,
        name: (e.tags && (e.tags.name || e.tags.brand)) || 'Unnamed',
        tags: e.tags || {},
        lat: center.lat,
        lon: center.lon,
        addr: (e.tags && (e.tags['addr:street']||'')) || ''
      };
    });
  }catch(err){ console.warn('Overpass fail', err); return []; }
}

// Nominatim fallback (looser)
async function nominatimSearch(q, lat, lon){
  try{
    const u = `https://nominatim.openstreetmap.org/search.php?q=${encodeURIComponent(q)}&format=jsonv2&limit=20`;
    const r = await fetch(u);
    if(!r.ok) return [];
    const j = await r.json();
    return j.map((p, idx)=>({
      id: 'nom_'+idx,
      name: p.display_name.split(',')[0] || q,
      tags: {},
      lat: Number(p.lat),
      lon: Number(p.lon),
      addr: p.display_name
    }));
  }catch(err){ console.warn('nominatim', err); return []; }
}

// filter stores by fuzzy match and categories. Do not hard-block categories; score instead.
function filterAndRankStores(stores, query){
  const q = (query||'').toLowerCase().trim();
  // score function
  function score(s){
    let sc = 0;
    // distance weight
    if(S.pos){
      s.distanceMeters = haversineMeters(S.pos, {lat:s.lat, lon:s.lon});
      sc += Math.max(0, 10000 - s.distanceMeters) / 1000; // closer gets bigger
    }
    const hay = ((s.name||'') + ' ' + (s.tags && (s.tags.shop||'') ) + ' ' + (s.addr||'')).toLowerCase();
    if(q){
      if(hay.includes(q)) sc += 50;
      const toks = q.split(/\s+/).filter(Boolean);
      let matches = 0;
      toks.forEach(t=>{ if(hay.includes(t)) matches++; });
      sc += matches * 20;
    }
    // prefer stores that look retail-ish (shop tag present)
    if(s.tags && (s.tags.shop || s.tags.amenity)) sc += 10;
    // price availability
    if(s.priceList && s.priceList.length) sc += 30;
    return sc;
  }
  const scored = stores.map(s => ({s,score:score(s)}));
  scored.sort((a,b)=>b.score - a.score);
  return scored.map(x=>x.s).slice(0,60);
}

// Fetch via AllOrigins raw endpoint to avoid CORS when possible
async function fetchViaProxy(url){
  const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
  try{
    const r = await fetch(proxy);
    if(!r.ok) throw new Error('proxy fail');
    return await r.text();
  }catch(err){
    // final fallback: attempt direct fetch (likely blocked)
    try{
      const r2 = await fetch(url);
      if(!r2.ok) throw new Error('direct fail');
      return await r2.text();
    }catch(e){ throw err; }
  }
}

// strict price parsing (accuracy prioritized)
function parsePrices(html){
  if(!html) return [];
  const out = [];
  // JSON-LD search for Product -> offers.price
  const matches = [...html.matchAll(/<script[^>]*type=(?:'|")application\/ld\+json(?:'|")[^>]*>([\s\S]*?)<\/script>/ig)];
  for(const m of matches){
    try{
      const parsed = JSON.parse(m[1]);
      const arr = Array.isArray(parsed) ? parsed : [parsed];
      for(const o of arr){
        if(o && (o['@type']=='Product' || (o['@type'] && /Product/i.test(o['@type'])))){
          if(o.offers){
            if(Array.isArray(o.offers)){
              for(const ofr of o.offers) if(ofr && ofr.price) out.push(Number(String(ofr.price).replace(/,/g,'')));
            } else {
              const ofr = o.offers;
              if(ofr.price) out.push(Number(String(ofr.price).replace(/,/g,'')));
            }
          }
          if(o.price) out.push(Number(String(o.price).replace(/,/g,'')));
        }
      }
    }catch(e){}
  }
  // strict currency symbol regex e.g. $12.34, €12.34, £12.34
  const rx = /([$€£¥])\s?(\d{1,3}(?:[.,]\d{3})*(?:\.\d{2})?)/g;
  let mm;
  while((mm = rx.exec(html)) !== null){
    const raw = mm[2].replace(/,/g,'');
    const val = Number(raw);
    if(Number.isFinite(val) && val > 0 && val < 100000) out.push(val);
  }
  // dedupe & sort
  const uniq = Array.from(new Set(out.filter(v=>Number.isFinite(v)).map(v=>Math.round(v*100)))).map(c=>c/100);
  uniq.sort((a,b)=>a-b);
  return uniq;
}

// attempt price parse for a store (non-blocking)
async function attemptPriceForStore(variant, store){
  const found = [];
  // try store website search if available
  if(store.tags && store.tags.website){
    try{
      const url = store.tags.website.replace(/\/$/,'') + '/search?q=' + encodeURIComponent(variant);
      const html = await fetchViaProxy(url);
      const p = parsePrices(html);
      if(p.length) found.push(...p);
    }catch(e){ /* ignore */ }
  }
  // try Google Shopping
  try{
    const url = 'https://www.google.com/search?q=' + encodeURIComponent(variant + ' ' + store.name) + '&tbm=shop';
    const html = await fetchViaProxy(url);
    const p = parsePrices(html);
    if(p.length) found.push(...p);
  }catch(e){}
  // try Bing Shopping
  try{
    const url = 'https://www.bing.com/shop?q=' + encodeURIComponent(variant + ' ' + store.name);
    const html = await fetchViaProxy(url);
    const p = parsePrices(html);
    if(p.length) found.push(...p);
  }catch(e){}

  // dedupe numeric values
  const uniq = Array.from(new Set(found.map(v=>Math.round(v*100)))).map(c=>c/100);
  uniq.sort((a,b)=>a-b);
  // return as objects with display formatting
  return uniq.map(v=>({value:v, display: '$' + v.toFixed(2)}));
}

// UI: clear results & markers
function clearResults(){
  resultsEl.innerHTML = '';
  (S.markers||[]).forEach(m=>{ try{ S.map.removeLayer(m); }catch(e){} });
  S.markers = [];
  S.stores = [];
}

// UI: add store card + marker
function addStoreToUI(store){
  const card = document.createElement('div'); card.className='storeCard';
  card.dataset.id = store._id || '';
  const left = document.createElement('div'); left.style.flex='1';
  left.innerHTML = `<h4>${escapeHtml(store.name)}</h4><div class="meta">${escapeHtml((store.tags && (store.tags.shop||store.tags.amenity||'')) + ' ' + (store.addr||''))}</div>`;
  const right = document.createElement('div'); right.className='actions';

  if(store.priceList && store.priceList.length){
    const lp = store.priceList[0];
    const priceEl = document.createElement('div'); priceEl.className='price'; priceEl.textContent = lp.display || ('$'+lp.value.toFixed(2));
    right.appendChild(priceEl);
    if(store.priceList.length>1){
      const more = document.createElement('div'); more.className='morePrices'; more.textContent = `More prices ▼ (${store.priceList.length})`;
      const list = document.createElement('div'); list.className='priceList'; list.style.display='none';
      store.priceList.forEach(p=> { const row = document.createElement('div'); row.textContent = p.display || ('$'+p.value.toFixed(2)); list.appendChild(row); });
      more.onclick = ()=>{ list.style.display = list.style.display==='none' ? 'block' : 'none'; };
      right.appendChild(more); right.appendChild(list);
    }
  } else {
    const no = document.createElement('div'); no.className='small'; no.textContent='Price not found';
    right.appendChild(no);
  }

  const searchUrl = store.searchUrl || ('https://www.google.com/search?q='+encodeURIComponent((S.currentVariant||'')+' '+store.name));
  const openBtn = document.createElement('a'); openBtn.className='linkBtn'; openBtn.href = searchUrl; openBtn.target='_blank'; openBtn.rel='noopener'; openBtn.textContent='Open search';
  right.appendChild(openBtn);
  const mapBtn = document.createElement('a'); mapBtn.className='linkBtn'; mapBtn.textContent='View on map'; mapBtn.onclick = ()=>{ S.map.setView([store.lat, store.lon], 16); store._marker && store._marker.openPopup(); };
  right.appendChild(mapBtn);

  card.appendChild(left);
  card.appendChild(right);

  const dist = document.createElement('div'); dist.className='small'; dist.style.marginTop='6px'; dist.textContent = store.distanceDisplay || '';
  card.appendChild(dist);

  card.onclick = ()=>{ document.querySelectorAll('.storeCard.active').forEach(e=>e.classList.remove('active')); card.classList.add('active'); S.map.setView([store.lat, store.lon], 16); store._marker && store._marker.openPopup(); };

  resultsEl.appendChild(card);

  // marker
  if(S.map){
    const marker = L.marker([store.lat, store.lon]).addTo(S.map)
      .bindPopup(`<strong>${escapeHtml(store.name)}</strong><br>${store.distanceDisplay || ''}${store.priceList && store.priceList.length ? ('<br>'+store.priceList[0].display) : ''}`);
    store._marker = marker;
    S.markers.push(marker);
    marker.on('click', ()=>{ document.querySelectorAll('.storeCard.active').forEach(e=>e.classList.remove('active')); card.classList.add('active'); });
  }
}

// render all current stores
function renderAllStores(){
  clearResults();
  S.stores.forEach(s => addStoreToUI(s));
}

// expand variants (simple)
function expandVariants(q){
  const a = new Set(); a.add(q);
  const t = q.toLowerCase();
  if(t.includes('milk')) ['whole milk','2% milk','skim milk','milk gallon'].forEach(x=>a.add(x));
  if(t.includes('egg')) ['eggs dozen','large eggs'].forEach(x=>a.add(x));
  if(t.includes('bread')) ['whole wheat bread','sourdough loaf'].forEach(x=>a.add(x));
  a.add(q+' 1 each'); a.add(q+' pack');
  return Array.from(a).slice(0,12);
}
function renderVariants(list){
  variantArea.innerHTML=''; list.forEach((v,i)=>{
    const el = document.createElement('div'); el.className='variant'; el.textContent = v;
    if(i===0) el.classList.add('active');
    el.onclick = async ()=>{
      document.querySelectorAll('.variant').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      S.currentVariant = v;
      // re-check top stores for prices
      setStatus('Checking prices for variant...');
      for(let i=0;i<Math.min(8,S.stores.length); i++){
        const s = S.stores[i];
        try{ const p = await attemptPriceForStore(S.currentVariant, s); if(p && p.length) s.priceList = p; }catch(e){}
        renderAllStores();
        await sleep(200);
      }
      setStatus('Variant check complete.');
    };
    variantArea.appendChild(el);
  });
}

// fallback links
function renderFallbackLinks(q){
  clearResults();
  const links = [
    {label:'Google Maps', url:`https://www.google.com/maps/search/${encodeURIComponent(q + ' near me')}`},
    {label:'Bing', url:`https://www.bing.com/search?q=${encodeURIComponent(q + ' near me')}`},
    {label:'DuckDuckGo', url:`https://duckduckgo.com/?q=${encodeURIComponent(q + ' near me')}`}
  ];
  links.forEach(l=>{
    const div = document.createElement('div'); div.className='storeCard';
    div.innerHTML = `<div style="flex:1"><strong>${escapeHtml(l.label)}</strong><div class="small">Open external search</div></div><div style="display:flex;flex-direction:column;gap:8px"><a class="linkBtn" href="${l.url}" target="_blank" rel="noopener">Open</a></div>`;
    resultsEl.appendChild(div);
  });
}

// get location once
async function getLocationOnce(){
  if(S.pos) return S.pos;
  return new Promise((res,rej)=>{
    if(!navigator.geolocation) return rej(new Error('no geo'));
    navigator.geolocation.getCurrentPosition(p=>{
      S.pos = {lat:p.coords.latitude, lon:p.coords.longitude};
      if(!S.map) initMap();
      L.circleMarker([S.pos.lat, S.pos.lon], {radius:7,color:'#22d3ee',fill:true,fillColor:'#22d3ee'}).addTo(S.map).bindPopup('You are here');
      S.map.setView([S.pos.lat, S.pos.lon], 13);
      res(S.pos);
    }, err=>rej(err), {enableHighAccuracy:true, timeout:10000});
  });
}

// initialize map
function initMap(){
  const mapDiv = document.getElementById('map');
  S.map = L.map(mapDiv).setView([39.5,-98.35], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'&copy; OpenStreetMap contributors' }).addTo(S.map);
}

// main search pipeline
async function doSearch(){
  clearResults();
  setStatus('Preparing search...');
  const q = (itemInput.value||'').trim();
  if(!q){ setStatus('Enter an item to search'); return; }
  S.variants = expandVariants(q);
  renderVariants(S.variants);
  S.currentVariant = S.variants[0] || q;
  // ensure location
  try{ await getLocationOnce(); } catch(e){ setStatus('Location required'); return; }

  setStatus('Searching nearby stores...');
  const cats = getCategoriesForQuery(q);
  const over = await overpassSearch(S.pos.lat, S.pos.lon, Number(radiusRange.value||S.radius), cats);
  let stores = over;
  if(!stores || stores.length===0){
    setStatus('No stores found in Overpass. Trying Nominatim fallback...');
    stores = await nominatimSearch(q, S.pos.lat, S.pos.lon);
  }

  if(!stores || stores.length===0){ setStatus('No nearby stores found. Showing external links.'); renderFallbackLinks(q); return; }

  // filter & rank
  const filtered = filterAndRankStores(stores, q);
  filtered.forEach((s, idx)=>{ s._id = `${s.id||'s'}_${idx}`; s.distanceMeters = Math.round(haversineMeters(S.pos, {lat:s.lat, lon:s.lon})); s.distanceDisplay = formatDistance(s.distanceMeters); s.searchUrl = `https://www.google.com/search?q=${encodeURIComponent((S.currentVariant||q)+' '+s.name)}`; });

  S.stores = filtered.slice(0,60);
  setStatus(`Found ${S.stores.length} stores. Rendering and checking prices...`);
  renderAllStores();

  // progressive price parsing for top stores (non-blocking; accurate parsing prioritized)
  for(let i=0;i<Math.min(12, S.stores.length); i++){
    const s = S.stores[i];
    try{
      const p = await attemptPriceForStore(S.currentVariant, s);
      if(p && p.length){ s.priceList = p; }
    }catch(e){}
    renderAllStores();
    await sleep(250);
  }

  setStatus(`Done. Showing ${S.stores.length} results.`);
}

// utility mapping from query -> categories (local wrapper)
function getCategoriesForQuery(q){
  return getCategoriesForQuery_core(q);
}
// decoupled core function (avoids duplicate name collisions)
function getCategoriesForQuery_core(q){
  const t = q.toLowerCase();
  if(CLUSTERS.food.some(w=>t.includes(w))) return ["supermarket","convenience","grocery","bakery","butcher","pharmacy"];
  if(CLUSTERS.auto.some(w=>t.includes(w))) return ["car_repair","car_dealer","tyres","fuel","car_parts"];
  if(CLUSTERS.pharmacy.some(w=>t.includes(w))) return ["pharmacy","drugstore"];
  if(CLUSTERS.electronics.some(w=>t.includes(w))) return ["electronics","department_store"];
  if(CLUSTERS.household.some(w=>t.includes(w))) return ["department_store","hardware"];
  return ["supermarket","convenience","department_store"];
}

// UI wiring
radiusRange.addEventListener('input', ()=>{ radiusLabel.textContent = formatDistance(Number(radiusRange.value)); radiusNumber.value = radiusRange.value; });
itemInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doSearch(); });
searchBtn.addEventListener('click', doSearch);

settingsBtn.addEventListener('click', ()=>{ settingsModal.style.display='flex'; settingsModal.setAttribute('aria-hidden','false'); });
closeSettings.addEventListener('click', ()=>{ settingsModal.style.display='none'; settingsModal.setAttribute('aria-hidden','true'); });
saveSettings.addEventListener('click', ()=>{
  S.unit = unitSelect.value; document.body.classList.toggle('light', themeSelect.value==='light');
  S.radius = Number(radiusNumber.value || S.radius); radiusRange.value = S.radius; radiusLabel.textContent = formatDistance(S.radius);
  unitLabel.textContent = 'units: '+S.unit;
  settingsModal.style.display='none';
  settingsModal.setAttribute('aria-hidden','true');
  renderAllStores();
});

// initial
initMap();
setStatus('Ready. Allow location and search.');

// expose for debugging if needed
window._S = S;

</script>
